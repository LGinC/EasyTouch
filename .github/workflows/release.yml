name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            platform_id: windows
            arch: x64
            binary_name: et.exe
            archive_name: easytouch-${{ github.ref_name }}-windows-x64.zip
            raw_artifact_name: raw-windows-x64
            zig_target: x86_64-windows
          - name: windows-arm64
            runner: windows-11-arm
            platform_id: windows
            arch: arm64
            binary_name: et.exe
            archive_name: easytouch-${{ github.ref_name }}-windows-arm64.zip
            raw_artifact_name: raw-windows-arm64
            zig_target: aarch64-windows
          - name: linux-x64
            runner: ubuntu-latest
            platform_id: linux
            arch: x64
            binary_name: et
            archive_name: easytouch-${{ github.ref_name }}-linux-x64.tar.gz
            raw_artifact_name: raw-linux-x64
            zig_target: x86_64-linux
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform_id: linux
            arch: arm64
            binary_name: et
            archive_name: easytouch-${{ github.ref_name }}-linux-arm64.tar.gz
            raw_artifact_name: raw-linux-arm64
            zig_target: aarch64-linux
          - name: macos-x64
            runner: macos-15-intel
            platform_id: macos
            arch: x64
            binary_name: et
            archive_name: easytouch-${{ github.ref_name }}-macos-x64.tar.gz
            raw_artifact_name: raw-macos-x64
            zig_target: x86_64-macos
          - name: macos-arm64
            runner: macos-14
            platform_id: macos
            arch: arm64
            binary_name: et
            archive_name: easytouch-${{ github.ref_name }}-macos-arm64.tar.gz
            raw_artifact_name: raw-macos-arm64
            zig_target: aarch64-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Build release binary
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSafe

      - name: Stage raw binary artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rawRoot = Join-Path $PWD 'dist/raw/${{ matrix.platform_id }}/${{ matrix.arch }}'
          New-Item -ItemType Directory -Force -Path $rawRoot | Out-Null
          Copy-Item 'zig-out/bin/et.exe' (Join-Path $rawRoot 'et.exe')

      - name: Stage raw binary artifact (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          raw_root="dist/raw/${{ matrix.platform_id }}/${{ matrix.arch }}"
          mkdir -p "$raw_root"
          cp zig-out/bin/et "$raw_root/et"
          chmod +x "$raw_root/et"

      - name: Stage release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetRoot = Join-Path $PWD 'dist/release/windows-x64'
          if ('${{ matrix.arch }}' -eq 'arm64') {
            $assetRoot = Join-Path $PWD 'dist/release/windows-arm64'
          }
          New-Item -ItemType Directory -Force -Path $assetRoot | Out-Null
          Copy-Item (Join-Path $PWD 'dist/raw/${{ matrix.platform_id }}/${{ matrix.arch }}/et.exe') (Join-Path $assetRoot 'et.exe')
          Copy-Item 'README.md' (Join-Path $assetRoot 'README.md')
          Copy-Item 'SKILL.md' (Join-Path $assetRoot 'SKILL.md')
          Copy-Item 'LICENSE.txt' (Join-Path $assetRoot 'LICENSE.txt')
          Compress-Archive -Path "$assetRoot/*" -DestinationPath (Join-Path 'dist/release' '${{ matrix.archive_name }}') -Force

      - name: Stage release archive (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          asset_root="dist/release/${{ matrix.name }}"
          mkdir -p "$asset_root"
          cp "dist/raw/${{ matrix.platform_id }}/${{ matrix.arch }}/et" "$asset_root/et"
          cp README.md "$asset_root/README.md"
          cp SKILL.md "$asset_root/SKILL.md"
          cp LICENSE.txt "$asset_root/LICENSE.txt"
          chmod +x "$asset_root/et"
          tar -C "$asset_root" -czf "dist/release/${{ matrix.archive_name }}" .

      - name: Upload release archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/release/${{ matrix.archive_name }}

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.raw_artifact_name }}
          path: dist/raw/${{ matrix.platform_id }}/${{ matrix.arch }}

  release:
    name: github-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*

  stage-platform-npm:
    name: stage-${{ matrix.package_name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: windows
            package_name: easytouch-windows
            binary_name: et.exe
          - platform_id: linux
            package_name: easytouch-linux
            binary_name: et
          - platform_id: macos
            package_name: easytouch-macos
            binary_name: et

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js for staging
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Normalize npm package versions
        run: node scripts/release/set-version.mjs ${{ github.ref_name }}

      - name: Download x64 raw artifact
        uses: actions/download-artifact@v5
        with:
          name: raw-${{ matrix.platform_id }}-x64
          path: dist/raw/${{ matrix.platform_id }}/x64

      - name: Download arm64 raw artifact
        uses: actions/download-artifact@v5
        with:
          name: raw-${{ matrix.platform_id }}-arm64
          path: dist/raw/${{ matrix.platform_id }}/arm64

      - name: Stage platform npm package
        run: |
          node scripts/release/stage-platform-package.mjs \
            --template packages/${{ matrix.package_name }} \
            --output dist/npm/${{ matrix.package_name }} \
            --binary-name ${{ matrix.binary_name }} \
            --binary x64=dist/raw/${{ matrix.platform_id }}/x64/${{ matrix.binary_name }} \
            --binary arm64=dist/raw/${{ matrix.platform_id }}/arm64/${{ matrix.binary_name }}

      - name: Upload npm platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.package_name }}
          path: dist/npm/${{ matrix.package_name }}

  publish-platform-npm:
    name: publish-${{ matrix.package_name }}
    needs: stage-platform-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - easytouch-windows
          - easytouch-linux
          - easytouch-macos

    steps:
      - name: Download platform npm artifact
        uses: actions/download-artifact@v5
        with:
          name: npm-${{ matrix.package_name }}
          path: dist/npm/${{ matrix.package_name }}

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Dry-run platform package
        run: npm pack --dry-run ./dist/npm/${{ matrix.package_name }}

      - name: Publish platform package
        run: npm publish --access public --provenance ./dist/npm/${{ matrix.package_name }}

  publish-root-npm:
    name: publish-root-npm
    needs:
      - publish-platform-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Normalize npm package versions
        run: node scripts/release/set-version.mjs ${{ github.ref_name }}

      - name: Dry-run root package
        run: npm pack --dry-run

      - name: Publish root package
        run: npm publish --access public --provenance
