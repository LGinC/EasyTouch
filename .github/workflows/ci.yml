name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            package_name: easytouch-windows
            binary_name: et.exe
          - name: linux-x64
            runner: ubuntu-latest
            package_name: easytouch-linux
            binary_name: et
          - name: macos-x64
            runner: macos-latest
            package_name: easytouch-macos
            binary_name: et

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Detect macOS SDK root
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Build EasyTouch
        run: zig build

      - name: Smoke test status
        run: zig build run -- status

      - name: Smoke test manifest JSON
        run: zig build run -- mcp-stdio --output json

      - name: Smoke test system info JSON
        run: zig build run -- system os-info --output json

      - name: Dry-run host platform npm package
        run: |
          node scripts/release/set-version.mjs 0.1.0-ci
          node scripts/release/stage-platform-package.mjs --template packages/${{ matrix.package_name }} --output dist/npm/${{ matrix.package_name }} --binary zig-out/bin/${{ matrix.binary_name }} --binary-name ${{ matrix.binary_name }}
          npm pack --dry-run ./dist/npm/${{ matrix.package_name }}

      - name: Smoke test platform init.js
        run: |
          node dist/npm/${{ matrix.package_name }}/init.js --output dist/init/${{ matrix.binary_name }} --force
          node -e "const fs=require('node:fs'); if (!fs.existsSync('dist/init/${{ matrix.binary_name }}')) process.exit(1);"

      - name: Smoke test platform tarball install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/tarballs | Out-Null
          $tgz = npm pack ./dist/npm/${{ matrix.package_name }} --pack-destination dist/tarballs | Select-Object -Last 1
          Remove-Item -Recurse -Force dist/install/platform -ErrorAction SilentlyContinue
          npm install --prefix dist/install/platform (Join-Path $PWD "dist/tarballs/$tgz")
          & ".\dist\install\platform\node_modules\.bin\et_x64.cmd" status
          & ".\dist\install\platform\node_modules\.bin\${{ matrix.package_name }}.cmd" init --force
          if (-not (Test-Path ".\dist\install\platform\node_modules\${{ matrix.package_name }}\et.exe")) {
            exit 1
          }
          & ".\dist\install\platform\node_modules\.bin\et.cmd" status

      - name: Smoke test platform tarball install (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/tarballs
          tgz=$(npm pack ./dist/npm/${{ matrix.package_name }} --pack-destination dist/tarballs | tail -n 1)
          rm -rf dist/install/platform
          npm install --prefix dist/install/platform "$PWD/dist/tarballs/$tgz"
          ./dist/install/platform/node_modules/.bin/et_x64 status
          ./dist/install/platform/node_modules/.bin/${{ matrix.package_name }} init --force
          test -f dist/install/platform/node_modules/${{ matrix.package_name }}/et
          ./dist/install/platform/node_modules/.bin/et status

      - name: Dry-run aggregated npm package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          node scripts/release/set-version.mjs 0.1.0-ci
          mkdir -p dist/raw/linux/x64
          cp zig-out/bin/et dist/raw/linux/x64/et
          chmod +x dist/raw/linux/x64/et
          node scripts/release/stage-root-package.mjs --template packages/easytouch --output dist/npm/easytouch
          npm pack --dry-run ./dist/npm/easytouch

      - name: Smoke test root init.js
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/tarballs
          tgz=$(npm pack ./dist/npm/easytouch --pack-destination dist/tarballs | tail -n 1)
          rm -rf dist/install/root
          npm install --prefix dist/install/root "$PWD/dist/tarballs/$tgz"
          ./dist/install/root/node_modules/.bin/easytouch init --force
          test -f dist/install/root/node_modules/@whuanle/easytouch/et
          ./dist/install/root/node_modules/.bin/et status
