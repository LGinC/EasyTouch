name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            package_name: easytouch-windows
            binary_name: easytouch.exe
          - name: linux-x64
            runner: ubuntu-latest
            package_name: easytouch-linux
            binary_name: easytouch
          - name: macos-x64
            runner: macos-latest
            package_name: easytouch-macos
            binary_name: easytouch

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Zig (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zigVersion = '0.15.2'
          $zipName = "zig-windows-x86_64-$zigVersion.zip"
          $url = "https://ziglang.org/download/$zigVersion/$zipName"
          Invoke-WebRequest -Uri $url -OutFile $zipName
          Expand-Archive -Path $zipName -DestinationPath . -Force
          $zigDir = Join-Path $PWD "zig-windows-x86_64-$zigVersion"
          $zigDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          zig version

      - name: Set up Zig (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          zig_version="0.15.2"
          case "$(uname -s)" in
            Linux)
              zig_os="linux"
              ;;
            Darwin)
              zig_os="macos"
              ;;
            *)
              echo "Unsupported OS: $(uname -s)"
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64)
              zig_arch="x86_64"
              ;;
            arm64|aarch64)
              zig_arch="aarch64"
              ;;
            *)
              echo "Unsupported arch: $(uname -m)"
              exit 1
              ;;
          esac

          archive="zig-${zig_os}-${zig_arch}-${zig_version}.tar.xz"
          url="https://ziglang.org/download/${zig_version}/${archive}"
          curl -fL "$url" -o "$archive"
          tar -xf "$archive"
          zig_dir="$PWD/zig-${zig_os}-${zig_arch}-${zig_version}"
          echo "$zig_dir" >> "$GITHUB_PATH"
          "$zig_dir/zig" version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Build EasyTouch
        run: zig build

      - name: Smoke test status
        run: zig build run -- status

      - name: Smoke test manifest JSON
        run: zig build run -- mcp-stdio --output json

      - name: Smoke test system info JSON
        run: zig build run -- system os-info --output json

      - name: Dry-run root npm package
        run: |
          node scripts/release/set-version.mjs 0.1.0-ci
          npm pack --dry-run

      - name: Dry-run host platform npm package
        run: |
          node scripts/release/stage-platform-package.mjs --template packages/${{ matrix.package_name }} --output dist/npm/${{ matrix.package_name }} --binary zig-out/bin/${{ matrix.binary_name }} --binary-name ${{ matrix.binary_name }}
          npm pack --dry-run ./dist/npm/${{ matrix.package_name }}
